name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── API ────────────────────────────────────────────────────────────────────
  api:
    name: API — Lint & Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgres://myquizztest:myquizztest@localhost:5432/myquizztest_db

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:spec:docker
        env:
          USE_PG_CLIENT: "true"
          POSTGRES_USER: myquizztest
          POSTGRES_PASSWORD: myquizztest
          POSTGRES_DB: myquizztest_db
          POSTGRES_ADMIN_URL: postgres://postgres:postgres@localhost:5432/postgres
          DATABASE_URL: postgres://myquizztest:myquizztest@localhost:5432/myquizztest_db
          JWT_SECRET: test-jwt-secret-for-integration-tests
          PORT: "7357"

  # ─── CLIENT ─────────────────────────────────────────────────────────────────
  client:
    name: Client — Type check & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:3001/api
